name: Daily - Full Build and Tests

on:
  schedule:
    - cron: '17 3 * * *'   # daily at 03:17 UTC
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or ref to test'
        required: false
        default: 'master'

permissions:
  contents: read

concurrency:
  group: daily-full-${{ github.event.inputs.ref || 'master' }}
  cancel-in-progress: false

jobs:
  full-build-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout requested ref on manual run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Checkout master on scheduled run
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Full build with all tests
        run: ./mvnw -B -ntp clean verify
