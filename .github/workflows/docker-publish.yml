name: Docker - Publish Image

on:
  workflow_run:
    workflows:
      - Master - Release Candidate
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to publish
        required: false
        default: master
      image_tag:
        description: Image tag to publish, for example rc-1 or v0.1.0-rc.1
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout release candidate commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${repository}"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            version="rc-${{ github.event.workflow_run.run_number }}"
            source_sha="${{ github.event.workflow_run.head_sha }}"
          else
            version="${{ github.event.inputs.image_tag }}"
            source_sha="$(git rev-parse HEAD)"

            if [[ -z "$version" ]]; then
              version="manual-${{ github.run_number }}"
            fi
          fi

          short_sha="${source_sha:0:12}"

          {
            echo "image=$image"
            echo "version=$version"
            echo "source_sha=$source_sha"
            echo "tags<<EOF"
            echo "$image:$version"
            echo "$image:sha-$short_sha"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.source_sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Add workflow summary
        run: |
          {
            echo "## Published Docker image"
            echo
            echo "Image: \`${{ steps.meta.outputs.image }}\`"
            echo "Version tag: \`${{ steps.meta.outputs.version }}\`"
            echo "Source commit: \`${{ steps.meta.outputs.source_sha }}\`"
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
