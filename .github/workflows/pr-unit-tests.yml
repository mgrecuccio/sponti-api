name: PR - Compile and Unit Tests

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-unit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-unit-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile and run unit tests
        run: ./mvnw -B -ntp clean test
