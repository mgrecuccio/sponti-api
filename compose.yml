services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sponti
      POSTGRES_USER: sponti
      POSTGRES_PASSWORD: sponti
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sponti -d sponti"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5