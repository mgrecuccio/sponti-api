spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}

sponti:
  notification:
    push-enabled: ${SPONTI_NOTIFICATION_PUSH_ENABLED:false}
    fcm:
      enabled: ${SPONTI_NOTIFICATION_FCM_ENABLED:false}
      credentials-path: ${FCM_CREDENTIALS_PATH:}
