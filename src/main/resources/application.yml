spring:
  application:
    name: sponti-api
  datasource:
    url: jdbc:postgresql://localhost:5432/sponti
    username: sponti
    password: sponti
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith

app:
  security:
    jwt:
      secret: "0123456789012345678901234567890123456789012345678901234567890123"
      access-token-minutes: 15
      refresh-token-days: 30
