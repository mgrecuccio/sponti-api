spring:
  application:
    name: sponti-api
  datasource:
    url: jdbc:postgresql://localhost:5432/sponti
    username: sponti
    password: sponti
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,modulith,firebase

app:
  cors:
    allowed-origin: http://localhost:8100
  security:
    jwt:
      secret: "0123456789012345678901234567890123456789012345678901234567890123"
      issuer: sponti-api
      access-token-minutes: 15
      refresh-token-days: 30

logging:
  level:
    root: INFO
    com.mgrtech.sponti_api: INFO
    org.springframework: WARN
    org.springframework.security: INFO
    org.hibernate: WARN
  structured:
    format:
      console: logstash
    json:
      context:
        include: true

sponti:
  matching:
    search-window: 4h
    minimum-overlap: 20m
    accepted-cooldown: 48h
    decline-cooldown: 24h
    suggestion-cooldown: 2h
    proposal-ttl: 30m
    opportunity-scheduler:
      enabled: true
      fixed-delay: 5m
    scoring:
      favorite-boost: 10
      free-now-boost: 20
      recent-accepted-penalty: 40
      recent-decline-penalty: 30
      recent-suggestion-penalty: 20
      quiet-hours-penalty: 50
      minimum-score: 1
      notification-minimum-score: 60
  notification:
    matching-suggestions-cooldown: 30m
    push-enabled: false
    fcm:
      enabled: false
      credentials-path: ${FCM_CREDENTIALS_PATH:}
    retry:
      enabled: true
      fixed-delay: 5m
      max-attempts: 3
